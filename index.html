<script>
// ===== Supabase設定 =====
const SUPABASE_URL = 'https://hpycoozpspcxtesuzdpw.supabase.co';

// ===== 定数・状態 =====
// ===== 拠点設定（depot.htmlで管理） =====
let DEPOT = {
  lat: 34.7309, lng: 135.0867,
  name: 'メープルツリー神戸ロジスティクスセンター',
  addr: '兵庫県神戸市西区見津が丘7丁目1-3'
};
// デポ座標を正しい値に固定
const DEPOT_KOBE  = { lat: 34.7309, lng: 135.0867 };
const DEPOT_TAMBA = { lat: 35.1167, lng: 135.0167 };

// ====================================================
// Geocoding共通関数（レート制限対応・順番保証）
// ====================================================
/**
 * 住所リストを順番を保証しながらGeocoding
 * @param {string[]} addresses - 住所の配列
 * @param {function} onProgress - (done, total) 進捗コールバック
 * @returns {Promise<Array<{lat,lng}|null>>} 元の順番で座標配列を返す
 */
function geocodeAddresses(addresses, onProgress) {
  return new Promise((resolve) => {
    const geocoder = new google.maps.Geocoder();
    const results = new Array(addresses.length).fill(null);
    // nullアドレスは即完了扱い
    const targets = addresses.map((addr, i) => ({ addr, i })).filter(({addr}) => addr);
    if (targets.length === 0) { resolve(results); return; }

    let completed = 0;
    let nextIdx = 0;
    const CONCURRENCY = 5; // 同時リクエスト数
    const total = targets.length;

    function done(i, result) {
      results[i] = result;
      completed++;
      if (onProgress) onProgress(completed, total);
      if (completed === total) { resolve(results); return; }
      if (nextIdx < targets.length) launch();
    }

    function launch() {
      if (nextIdx >= targets.length) return;
      const { addr, i } = targets[nextIdx++];
      geocoder.geocode({ address: addr }, (res, status) => {
        if (status === 'OK') {
          done(i, { lat: res[0].geometry.location.lat(), lng: res[0].geometry.location.lng() });
        } else if (status === 'OVER_QUERY_LIMIT') {
          nextIdx--; // 戻してリトライ
          setTimeout(launch, 1000);
        } else {
          done(i, null);
        }
      });
    }

    // 最初にCONCURRENCY件を同時に開始
    const initialBatch = Math.min(CONCURRENCY, targets.length);
    for (let k = 0; k < initialBatch; k++) launch();
  });
}

// デポの正しい座標（住所から確認済み）
const DEPOT_CORRECT_COORDS = {
  '兵庫県神戸市西区見津が丘7丁目1-3': { lat: 34.7309, lng: 135.0867 },
  '兵庫県丹波市氷上町氷上10':         { lat: 35.1167, lng: 135.0167 }
};

function loadDepotsFromStorage() {
  try {
    const d = localStorage.getItem('haisha_depots');
    const m = localStorage.getItem('haisha_mappings');
    if (d) window._depots   = JSON.parse(d);
    if (m) window._mappings = JSON.parse(m);
  } catch(e) {}
  if (!window._depots) {
    window._depots = [
      { id:1, name:'神戸デポ', loadAddr:'兵庫県神戸市西区見津が丘7丁目1-3', departAddr:'', csvCode:'2806', lat:34.7309, lng:135.0867 },
      { id:2, name:'丹波デポ', loadAddr:'兵庫県丹波市氷上町氷上10', departAddr:'', csvCode:'2805', lat:35.1167, lng:135.0167 }
    ];
    window._mappings = { '2806':1, '2805':2 };
  }
  // localStorageに古い座標が保存されている場合は自動補正する
  let needsSave = false;
  (window._depots || []).forEach(depot => {
    const addr = depot.loadAddr || '';
    const correct = DEPOT_CORRECT_COORDS[addr];
    if (correct) {
      const latOk = Math.abs((depot.lat || 0) - correct.lat) < 0.001;
      const lngOk = Math.abs((depot.lng || 0) - correct.lng) < 0.001;
      if (!latOk || !lngOk) {
        depot.lat = correct.lat;
        depot.lng = correct.lng;
        needsSave = true;
      }
    }
  });
  if (needsSave) {
    try { localStorage.setItem('haisha_depots', JSON.stringify(window._depots)); } catch(e){}
  }
}

function setDepotByCode(csvCode) {
  if (!csvCode || !window._mappings) return;
  const depotId = window._mappings[csvCode];
  if (!depotId) return;
  const depot = (window._depots||[]).find(d => d.id == depotId);
  if (!depot) return;

  const useAddr = depot.departAddr || depot.loadAddr;

  // デポ情報をサイドバーに反映
  // depot-selectorがある場合はそちらで管理するのでスキップ
  const nameEl = document.querySelector('.depot-name');
  const addrEl = document.querySelector('.depot-addr');
  if (nameEl) nameEl.textContent = depot.name;
  if (addrEl) addrEl.textContent = useAddr;

  // 座標の確定：①localStorageに保存済みならそれを使う、②なければGeocodingで取得
  if (depot.lat && depot.lng) {
    DEPOT = { lat: depot.lat, lng: depot.lng, name: depot.name, addr: useAddr };
    if (depotMarker) {
      depotMarker.setPosition({ lat: DEPOT.lat, lng: DEPOT.lng });
      depotMarker.setTitle(DEPOT.name);
    }
    document.getElementById('status').textContent += ` ／ 拠点: ${depot.name}`;
  } else {
    // 座標未保存 → まずデフォルト値で設定してからGeocodingで上書き
    DEPOT = { lat: 34.7309, lng: 135.0867, name: depot.name, addr: useAddr };
    document.getElementById('status').textContent += ` ／ 拠点: ${depot.name}（座標取得中）`;
    if (map) {
      const gc = new google.maps.Geocoder();
      gc.geocode({ address: useAddr }, (results, status) => {
        if (status === 'OK') {
          DEPOT.lat = results[0].geometry.location.lat();
          DEPOT.lng = results[0].geometry.location.lng();
          // 次回から使えるようlocalStorageに保存
          depot.lat = DEPOT.lat;
          depot.lng = DEPOT.lng;
          try { localStorage.setItem('haisha_depots', JSON.stringify(window._depots)); } catch(e){}
          if (depotMarker) depotMarker.setPosition({ lat: DEPOT.lat, lng: DEPOT.lng });
          const s = document.getElementById('status');
          if (s) s.textContent = s.textContent.replace('（座標取得中）', '');
        }
      });
    }
  }
}
const DRIVER_COLORS = [
  '#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4',
  '#ff5722','#607d8b','#795548','#4caf50','#2196f3',
  '#ff9800','#9c27b0','#03a9f4','#8bc34a','#f44336'
];

async function syncDriversFromSupabase() {
  try {
    const { data, error } = await sbClient.from('drivers').select('*').order('code');
    if (error || !data || data.length === 0) return;
    const synced = data.map(row => ({
      id: row.id || Date.now() + Math.random(),
      code: row.code || '', name: row.name || '',
      depot: row.depot || '', vehicle: row.vehicle || '',
      vehicleId: row.vehicle_id || '', phone: row.phone || '',
      courses: row.courses ? row.courses.split(',').filter(Boolean) : [],
      coursesBin2: row.courses_bin2 ? row.courses_bin2.split(',').filter(Boolean) : [],
      carrier: row.carrier || '',
      availableToday: row.available_today !== false,
      yoizumiToday: row.yoizumi_today || false,
      note: row.note || '',
    }));
    drivers = synced;
    saveDrivers();
    renderDriverSidebar();
  } catch(e) { console.warn('ドライバー同期エラー:', e); }
}

async function syncStoresFromSupabase() {
  try {
    let allData = [], from = 0;
    while (true) {
      const { data, error } = await sbClient.from('stores').select('*').range(from, from + 499);
      if (error) throw error;
      if (!data || data.length === 0) break;
      allData = allData.concat(data);
      if (data.length < 500) break;
      from += 500;
    }
    if (allData.length === 0) return;
    let savedStores = {};
    try { savedStores = JSON.parse(localStorage.getItem('haisha_stores') || '{}'); } catch(e) {}
    allData.forEach(row => {
      if (!savedStores[row.code]) {
        savedStores[row.code] = {
          name: row.name || '', addr: row.addr || '',
          lat: row.lat, lng: row.lng,
          course: row.course || '', depot: row.depot || '',
          depotManual: row.depot_manual || false,
          customLat: row.custom_lat, customLng: row.custom_lng,
          hasCustom: row.has_custom || false,
        };
      } else {
        if (!savedStores[row.code].depot && row.depot) savedStores[row.code].depot = row.depot;
        if (!savedStores[row.code].lat && row.lat) { savedStores[row.code].lat = row.lat; savedStores[row.code].lng = row.lng; }
      }
    });
    localStorage.setItem('haisha_stores', JSON.stringify(savedStores));
  } catch(e) { console.warn('店舗同期エラー:', e); }
}

function updateDateLabel() {
  const el = document.getElementById('current-date-label');
  if (!el) return;
  if (!currentDate || currentDate.length !== 8) { el.textContent = ''; return; }
  const y = currentDate.slice(0,4);
  const m = parseInt(currentDate.slice(4,6));
  const d = parseInt(currentDate.slice(6,8));
  const youbi = '日月火水木金土'[new Date(parseInt(y), m-1, d).getDay()];
  el.textContent = '📅 ' + y + '年' + m + '月' + d + '日（' + youbi + '）';
}

// ===== 配車スナップショット保存・呼び出し =====
function saveSnapshot() {
  if (locations.length === 0) {
    alert('保存するデータがありません。先にCSVを読み込んでください。');
    return;
  }
  const defaultName = (function() {
    if (!currentDate || currentDate.length !== 8) return '配車データ';
    const m = parseInt(currentDate.slice(4,6));
    const d = parseInt(currentDate.slice(6,8));
    return m + '月' + d + '日の配車';
  })();

  const name = window.prompt('保存名を入力してください', defaultName);
  if (!name) return;

  const snapshot = {
    name: name,
    savedAt: new Date().toISOString(),
    currentDate: currentDate,
    currentBusho: currentBusho,
    DEPOT: Object.assign({}, DEPOT),
    locations: locations.map(function(l) { return Object.assign({}, l); }),
    orderedLocations: orderedLocations.map(function(l) { return Object.assign({}, l); }),
    assignments: JSON.parse(JSON.stringify(assignments)),
  };

  var list = [];
  try { list = JSON.parse(localStorage.getItem('haisha_snapshots') || '[]'); } catch(e) {}
  var existIdx = list.findIndex(function(s) { return s.name === name; });
  if (existIdx >= 0) {
    if (!confirm('「' + name + '」はすでに保存されています。上書きしますか？')) return;
    list[existIdx] = snapshot;
  } else {
    list.unshift(snapshot);
    if (list.length > 30) list = list.slice(0, 30);
  }
  localStorage.setItem('haisha_snapshots', JSON.stringify(list));

  // Supabaseにも同時に送信
  syncToSupabase(name);
}

async function syncToSupabase(name) {
  try {
    // 既存データ削除
    if (currentDeliveryId) {
      await sbClient.from('deliveries').delete().eq('id', currentDeliveryId);
    }

    // deliveriesテーブルに保存
    const { data: delData, error: delErr } = await sbClient
      .from('deliveries')
      .insert({ busho: currentBusho, delivery_date: currentDate })
      .select().single();
    if (delErr) throw delErr;
    currentDeliveryId = delData.id;

    // delivery_stopsに全店舗を保存（ドライバーごとに連番）
    const driverOrderMap = {};
    const stops = locations.map((loc, i) => {
      const asgn = assignments[i];
      const driverIdx = asgn ? drivers.findIndex(d => d.id === asgn.driverId) : -1;
      const driverKey = asgn ? String(asgn.driverId) : 'unassigned';
      if (!driverOrderMap[driverKey]) driverOrderMap[driverKey] = 0;
      driverOrderMap[driverKey]++;
      return {
        delivery_id: currentDeliveryId,
        stop_order: driverOrderMap[driverKey],
        name: loc.name,
        address: loc.addr,
        lat: loc.lat,
        lng: loc.lng,
        items: loc.items ? Number(loc.items) : null,
        vol: loc.vol ? Number(loc.vol) : null,
        driver_id: asgn ? String(asgn.driverId) : null,
        driver_name: driverIdx >= 0 ? drivers[driverIdx].name : null,
        bin: asgn ? asgn.bin : null,
        status: 'pending'
      };
    });

    const { error: stopsErr } = await sbClient.from('delivery_stops').insert(stops);
    if (stopsErr) throw stopsErr;

    document.getElementById('status').textContent = '「' + name + '」を保存しました（ドライバーに配信済み）';
  } catch(err) {
    document.getElementById('status').textContent = 'ローカル保存済み。Supabase送信エラー: ' + err.message;
  }
}

function loadSnapshot(idx) {
  var list = [];
  try { list = JSON.parse(localStorage.getItem('haisha_snapshots') || '[]'); } catch(e) {}
  var s = list[idx];
  if (!s) return;

  if (locations.length > 0) {
    if (!confirm('現在のデータは破棄されます。「' + s.name + '」を呼び出しますか？')) return;
  }

  currentDate      = s.currentDate || '';
  currentBusho     = s.currentBusho || 1;
  DEPOT            = Object.assign({}, s.DEPOT);
  locations        = (s.locations || []).map(function(l) { return Object.assign({}, l); });
  orderedLocations = (s.orderedLocations || []).map(function(l) { return Object.assign({}, l); });
  assignments      = JSON.parse(JSON.stringify(s.assignments || {}));

  var ov = document.getElementById('snapshot-overlay');
  if (ov) ov.remove();

  markers.forEach(function(m) { m.setMap(null); }); markers = [];
  if (routeLine) { routeLine.setMap(null); routeLine = null; }
  clearRouteLines();

  if (depotMarker) depotMarker.setMap(null);
  depotMarker = new google.maps.Marker({
    position: { lat: DEPOT.lat, lng: DEPOT.lng }, map: map,
    title: DEPOT.name,
    icon: { path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW, scale: 6, fillColor:'#8b5cf6', fillOpacity:1, strokeColor:'#fff', strokeWeight:2 }
  });

  var bounds = new google.maps.LatLngBounds();
  bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
  locations.forEach(function(loc, i) {
    var marker = new google.maps.Marker({
      position: { lat: loc.lat, lng: loc.lng }, map: map,
      label: { text: String(i+1), color:'white', fontSize:'11px', fontWeight:'bold' },
      title: loc.name
    });
    markers.push(marker);
    bounds.extend({ lat: loc.lat, lng: loc.lng });
  });
  map.fitBounds(bounds);

  updateDateLabel();
  renderRightSidebar();
  renderDriverSidebar();
  document.getElementById('status').textContent = '「' + s.name + '」を呼び出しました（' + locations.length + '件）';
}

function deleteSnapshot(idx) {
  var list = [];
  try { list = JSON.parse(localStorage.getItem('haisha_snapshots') || '[]'); } catch(e) {}
  var s = list[idx];
  if (!s) return;
  if (!confirm('「' + s.name + '」を削除しますか？')) return;
  list.splice(idx, 1);
  localStorage.setItem('haisha_snapshots', JSON.stringify(list));
  var ov = document.getElementById('snapshot-overlay');
  if (ov) ov.remove();
  showSnapshotList();
}

}

function parseExcelDate(val) {
  if (!val) return null;
  if (val instanceof Date) return fmt(val);
  if (typeof val === 'number') {
    const d = new Date(new Date(1899,11,30).getTime() + val * 86400000);
    return fmt(d);
  }
  const str = String(val).replace(/[\/\-年月]/g,'').replace('日','').trim();
  if (str.length === 8) return str;
  const d = new Date(val);
  if (!isNaN(d)) return fmt(d);
  return null;
}
function fmt(d) { return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function todayStr() { return fmt(new Date()); }

function getDeliveryDate(dateStr, busho) {
  if (!dateStr || dateStr.length !== 8) return '不明';
  let date = new Date(parseInt(dateStr.slice(0,4)), parseInt(dateStr.slice(4,6))-1, parseInt(dateStr.slice(6,8)));
  date.setDate(date.getDate() + 1);
  if (busho === 1) { if (date.getDay()===0) date.setDate(date.getDate()+1); }
  else { if (date.getDay()===6) date.setDate(date.getDate()+2); if (date.getDay()===0) date.setDate(date.getDate()+1); }
  return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${'日月火水木金土'[date.getDay()]}）`;
}

// ===== CSV/Excel振り分け =====
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  // データが既にある場合は追加/上書きを選択
  if (locations.length > 0) {
    showLoadModeDialog(file);
  } else {
    doLoadFile(file, false);
  }
  // inputをリセット（同じファイルを再選択できるように）
  event.target.value = '';
}

// 追加/上書き選択ダイアログ
function showLoadModeDialog(file) {
  // ファイルの日付を先に読んでからダイアログを出す
  const reader = new FileReader();
  reader.onload = function(e) {
    let fileDateStr = null;
    try {
      const uint8 = new Uint8Array(e.target.result);
      let text = '';
      try { text = new TextDecoder('shift-jis').decode(uint8); }
      catch(err) { text = new TextDecoder('utf-8').decode(uint8); }
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length >= 2) {
        function parseCSVLine2(line) {
          const result = []; let cur = '', inQ = false;
          for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { inQ = !inQ; }
            else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
            else { cur += c; }
          }
          result.push(cur.trim()); return result;
        }
        const headers = parseCSVLine2(lines[0]);
        const dateIdx = headers.findIndex(h => h.includes('配送年月日') || h.includes('日付'));
        if (dateIdx >= 0 && lines[1]) {
          const firstRow = parseCSVLine2(lines[1]);
          const dateVal = firstRow[dateIdx];
          if (dateVal) {
            const cleaned = dateVal.replace(/[^0-9]/g,'');
            if (cleaned.length === 8) fileDateStr = cleaned;
          }
        }
      }
    } catch(err) {}

    // 日付を表示用にフォーマット
    function formatDate(d) {
      if (!d || d.length !== 8) return null;
      return `${d.slice(0,4)}年${parseInt(d.slice(4,6))}月${parseInt(d.slice(6,8))}日`;
    }

    const existingDateLabel = currentDate ? formatDate(currentDate) : null;
    const fileeDateLabel    = fileDateStr  ? formatDate(fileDateStr)  : null;

    // 日付が違う場合の警告メッセージ
    let dateWarning = '';
    if (existingDateLabel && fileeDateLabel && currentDate !== fileDateStr) {
      dateWarning = `
        <div style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:8px;padding:10px 14px;margin-bottom:16px;text-align:left;">
          <div style="color:#f87171;font-weight:700;font-size:13px;margin-bottom:4px;">⚠️ 日付が違います</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6);">
            現在のデータ：<span style="color:#f59e0b;font-weight:700;">${existingDateLabel}</span><br>
            読み込むファイル：<span style="color:#f59e0b;font-weight:700;">${fileeDateLabel}</span>
          </div>
          <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:6px;">別の日のデータです。本当に追加しますか？</div>
        </div>`;
    } else if (existingDateLabel && fileeDateLabel && currentDate === fileDateStr) {
      dateWarning = `
        <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:8px 14px;margin-bottom:16px;text-align:left;">
          <div style="font-size:12px;color:#6ee7b7;">✅ 同じ日付のデータです（${existingDateLabel}）</div>
        </div>`;
    }

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
    overlay.innerHTML = `
      <div style="background:#1a2535;border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:28px 32px;max-width:420px;width:90%;text-align:center;">
        <div style="font-size:28px;margin-bottom:12px;">📂</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:8px;">データの読み込み方法</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:16px;">
          現在 <span style="color:#f59e0b;font-weight:700;">${locations.length}件</span> のデータが読み込まれています。<br>
          「<strong>${file.name}</strong>」をどのように読み込みますか？
        </div>
        ${dateWarning}
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button onclick="doLoadFile(window._pendingFile, true);document.body.removeChild(this.closest('[style*=fixed]'))"
            style="padding:12px;background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);color:#10b981;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;">
            ➕ 追加読み込み<br>
            <span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);">既存の配車はそのまま・新しい届け先だけ追加</span>
          </button>
          <button onclick="doLoadFile(window._pendingFile, false);document.body.removeChild(this.closest('[style*=fixed]'))"
            style="padding:12px;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);color:#93c5fd;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;">
            🔄 上書き読み込み<br>
            <span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);">現在のデータをクリアして最初から</span>
          </button>
          <button onclick="document.body.removeChild(this.closest('[style*=fixed]'))"

            キャンセル
          </button>
        </div>
      </div>
    `;
    window._pendingFile = file;
    document.body.appendChild(overlay);
  };
  reader.readAsArrayBuffer(file);
}

function doLoadFile(file, appendMode) {
  window._appendMode = appendMode;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    loadCSV(file);
  } else {
    loadExcel({ target: { files: [file] } });
  }
}

// ===== CSV読み込み =====
function loadCSV(file) {
  document.getElementById('status').textContent = 'CSV読み込み中...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      // エンコーディング自動判定（Shift-JIS対応）
      const buffer = e.target.result;
      const uint8 = new Uint8Array(buffer);
      let text = '';
      // Shift-JISで試みる
      try {
        const decoder = new TextDecoder('shift-jis');
        text = decoder.decode(uint8);
      } catch(err) {
        const decoder = new TextDecoder('utf-8');
        text = decoder.decode(uint8);
      }

      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { document.getElementById('status').textContent = 'データが見つかりません'; return; }

      // ヘッダー解析（クォート対応）
      function parseCSVLine(line) {
        const result = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { inQ = !inQ; }
          else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
          else { cur += c; }
        }
        result.push(cur.trim());
        return result;
      }

      const headers = parseCSVLine(lines[0]);
      // 列インデックスを取得
      const nameIdx  = headers.findIndex(h => h.includes('届け先名') || h.includes('顧客名称'));
      const addrIdx  = headers.findIndex(h => h.includes('届け先住所') || h.includes('顧客住所1'));
      const itemIdx  = headers.findIndex(h => h.includes('ケースロケーション出荷数（ケース換算）') || h.includes('ケース換算') || h === '個数');
      const volIdx   = headers.findIndex(h => h === '明細才数' || h === '才数');
      const dateIdx  = headers.findIndex(h => h.includes('配送年月日') || h.includes('日付'));
      const codeIdx   = headers.findIndex(h => h.includes('届け先コード') || h.includes('顧客コード'));
      const courseIdx = headers.findIndex(h => h === '配送コース' || h.includes('配送コース'));

      if (nameIdx < 0 || addrIdx < 0) {
        document.getElementById('status').textContent = '届け先名・住所の列が見つかりません';
        return;
      }

      // 届け先コードで集計
      const shopMap = new Map();
      const rows = lines.slice(1);

      const depotCodeIdx = headers.findIndex(h => h.includes('配送拠点コード'));
      rows.forEach(line => {
        if (!line.trim()) return;
        const cols = parseCSVLine(line);
        const code = codeIdx >= 0 ? cols[codeIdx] : cols[nameIdx];
        const name = cols[nameIdx] || '';
        const addr = cols[addrIdx] || '';
        const items = parseFloat(cols[itemIdx]) || 0;
        const vol   = parseFloat(cols[volIdx])   || 0;
        const course = courseIdx >= 0 ? (cols[courseIdx] || '').trim().replace(/^'+/, '').padStart(2, '0') : '';
        const depotCode = depotCodeIdx >= 0 ? (cols[depotCodeIdx]||'').trim().replace(/^'+/, '') : '';

        if (!name.trim() || !addr.trim()) return;

        if (!shopMap.has(code)) {
          shopMap.set(code, { name: name.trim(), addr: addr.trim(), items: 0, vol: 0, depotCode, course: course || '' });
        }
        const shop = shopMap.get(code);
        shop.items += items;
        shop.vol   += vol;
        if (depotCode) shop.depotCode = depotCode;
      });

      // 配送日取得
      if (dateIdx >= 0 && rows[0]) {
        const firstRow = parseCSVLine(rows[0]);
        const dateVal = firstRow[dateIdx];
        if (dateVal) {
          const cleaned = dateVal.replace(/[^0-9]/g,'');
          if (cleaned.length === 8) currentDate = cleaned;
          else currentDate = todayStr();
        }
      } else {
        currentDate = todayStr();
      }

      // 地図にプロット
      const appendMode = window._appendMode === true;
      window._appendMode = false;

      // 拠点コードでデポを自動切り替え（追加モードの場合はスキップ）
      if (!appendMode) {
        const csvCodes = [...new Set(rows.map(line => {
          if (!line.trim()) return null;
          const cols = parseCSVLine(line);
          const codeIdx2 = headers.findIndex(h => h.includes('配送拠点コード'));
          return codeIdx2 >= 0 ? cols[codeIdx2] : null;
        }).filter(Boolean))];
        if (csvCodes.length > 0) setDepotByCode(csvCodes[0]);

        // 上書きモード：全クリア
        markers.forEach(m => m.setMap(null)); markers = [];
        if (routeLine) { routeLine.setMap(null); routeLine = null; }
        clearRouteLines();
        locations = []; orderedLocations = []; assignments = {}; currentDeliveryId = null;
      }

      // 届け先コードをshopに保存しておく
      const shopEntries = Array.from(shopMap.entries()); // [code, shop]
      // 追加モードの場合、既存の届け先コードはスキップ
      const existingCodes = new Set(locations.map(l => l.code).filter(Boolean));
      const allShops = shopEntries.map(([code, shop]) => ({ ...shop, code }));
      const shops = appendMode
        ? allShops.filter(s => !existingCodes.has(s.code))
        : allShops;

      if (appendMode && shops.length === 0) {
        document.getElementById('status').textContent = '追加する新しい配送先はありませんでした（全件重複）';
        return;
      }
      if (appendMode) {
        document.getElementById('status').textContent = `${shops.length}件を追加します...`;
      }

      // 店舗管理から保存済み座標を読み込む
      let savedStores = {};
      try { savedStores = JSON.parse(localStorage.getItem('haisha_stores') || '{}'); } catch(e) {}

      // 保存済み座標がある店舗はGeocoding不要
      const shopsNeedGeocode = shops.map(shop => {
        const saved = savedStores[shop.code];
        if (saved && (saved.customLat || saved.lat)) {
          return null; // 保存済み → Geocoding不要
        }
        return shop.addr;
      });

      const needCount = shopsNeedGeocode.filter(Boolean).length;
      if (needCount === 0) {
        document.getElementById('status').textContent = `${shops.length}件を地図に配置中...`;
      } else {
        document.getElementById('status').textContent = `${shops.length}件中${needCount}件を座標取得中... (0/${needCount})`;
      }

      geocodeAddresses(shopsNeedGeocode, (done, total) => {
        document.getElementById('status').textContent = `座標取得中... (${done}/${total})`;
      }).then(coords => {
        // 店舗管理に座標を自動登録（Geocoding結果）
        shops.forEach((shop, i) => {
          const saved = savedStores[shop.code];
          if (!saved) {
            savedStores[shop.code] = { name: shop.name, addr: shop.addr, lat: null, lng: null, hasCustom: false };
          }
          if (coords[i]) {
            savedStores[shop.code].lat = coords[i].lat;
            savedStores[shop.code].lng = coords[i].lng;
          }
          savedStores[shop.code].name = shop.name;
          savedStores[shop.code].addr = shop.addr;
          savedStores[shop.code].course = shop.course || savedStores[shop.code].course || '';
          if (shop.depotCode) savedStores[shop.code].depot = shop.depotCode;
        });
        try { localStorage.setItem('haisha_stores', JSON.stringify(savedStores)); } catch(e) {}
        (async () => {
          try {
            const upserts = shops.map(shop => {
              const s = savedStores[shop.code];
              return { code: shop.code, name: s.name||'', addr: s.addr||'',
                lat: s.lat||null, lng: s.lng||null, course: s.course||'', depot: s.depot||'',
                depot_manual: s.depotManual||false, updated_at: new Date().toISOString() };
            }).filter(s => s.code);
            for (let i = 0; i < upserts.length; i += 50) {
              await sbClient.from('stores').upsert(upserts.slice(i,i+50), { onConflict: 'code' });
            }
          } catch(e) { console.error('店舗Supabase保存エラー:', e); }
        })();

        if (!appendMode) {
          markers.forEach(m => m.setMap(null)); markers = [];
        }
        shops.forEach((shop, i) => {
          const saved = savedStores[shop.code];
          // 優先順位：①手動修正座標 ②Geocoding結果 ③スキップ
          const lat = saved?.customLat || saved?.lat || coords[i]?.lat;
          const lng = saved?.customLng || saved?.lng || coords[i]?.lng;
          const c = (lat && lng) ? { lat, lng } : null;
          if (!c) return;
          const loc = {
            name: shop.name, addr: shop.addr, course: shop.course || '',
            lat: c.lat, lng: c.lng,
            items: shop.items, vol: parseFloat(shop.vol.toFixed(3)),
            code: shop.code,
            depotCode: shop.depotCode || ''
          };
          locations.push(loc);
          const markerIdx = locations.length - 1;
          const marker = new google.maps.Marker({
            position: { lat: c.lat, lng: c.lng }, map, title: shop.name,
            label: { text: String(markerIdx+1), color: 'white', fontSize: '11px', fontWeight: 'bold' }
          });
          marker.addListener('click', () => new google.maps.InfoWindow({
            content: `<div style="font-size:13px;"><b>${shop.name}</b><br><span style="color:#666;font-size:12px;">${shop.addr}</span><br><span style="font-size:12px;">個数: ${shop.items}個 / ${shop.vol.toFixed(2)}才</span></div>`
          }).open(map, marker));
          markers.push(marker);
        });
        const modeLabel = appendMode ? `追加読み込み（+${shops.length}件）` : 'CSV読み込み';
        document.getElementById('status').textContent = `${locations.length}件を表示しました（${modeLabel}）`;
        updateDateLabel();
        updateSidebar(locations, false);
        renderDriverSidebar();
        renderRightSidebar();
        renderDepotFilterBtns();
        saveLocationsToSession();
        if (locations.length > 0) {
          const bounds = new google.maps.LatLngBounds();
          bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
          locations.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
          map.fitBounds(bounds);
        }
      });

    } catch(err) {
      document.getElementById('status').textContent = 'CSVエラー: ' + err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== Excel読み込み =====
function loadExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = '読み込み中...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { raw: false });
      const rowsRaw = XLSX.utils.sheet_to_json(sheet, { raw: true });
      if (rows.length === 0) { document.getElementById('status').textContent = 'データが見つかりません'; return; }
      const keys = Object.keys(rows[0]);
      const addrKey = keys.find(k => k.includes('顧客住所1') || k.includes('住所'));
      const nameKey = keys.find(k => k.includes('顧客名称') || k.includes('名称'));
      const itemKey = keys.find(k => k === '個数' || k.includes('数量'));
      const volKey  = keys.find(k => k === '才数' || k.includes('才'));
      const dateKey = keys.find(k => k.includes('日付'));
      if (!addrKey) { document.getElementById('status').textContent = '住所列が見つかりません'; return; }
      currentDate = (dateKey && rowsRaw[0][dateKey]) ? (parseExcelDate(rowsRaw[0][dateKey]) || todayStr()) : todayStr();
      markers.forEach(m => m.setMap(null)); markers = [];
      if (routeLine) { routeLine.setMap(null); routeLine = null; }
      locations = []; orderedLocations = []; assignments = {}; currentDeliveryId = null;
      document.getElementById('status').textContent = `${rows.length}件を地図に配置中...`;
      const rowData = rows.map((row, i) => ({
        name:  String(nameKey ? row[nameKey] : `配送先${i+1}`),
        addr:  row[addrKey] ? String(row[addrKey]) : null,
        items: itemKey ? rowsRaw[i][itemKey] : null,
        vol:   volKey  ? rowsRaw[i][volKey]  : null
      }));
      const addresses = rowData.map(r => r.addr);
      document.getElementById('status').textContent = `${addresses.filter(Boolean).length}件を地図に配置中... (0/${addresses.filter(Boolean).length})`;
      geocodeAddresses(addresses, (done, total) => {
        document.getElementById('status').textContent = `地図に配置中... (${done}/${total})`;
      }).then(coords => {
        markers.forEach(m => m.setMap(null)); markers = [];
        rowData.forEach((row, i) => {
          const c = coords[i];
          if (!c || !row.addr) return;
          const loc = { name: row.name, addr: row.addr, lat: c.lat, lng: c.lng, items: row.items, vol: row.vol };
          locations.push(loc);
          const markerIdx = locations.length - 1;
          const marker = new google.maps.Marker({
            position: { lat: c.lat, lng: c.lng }, map, title: row.name,
            label: { text: String(markerIdx+1), color: 'white', fontSize: '11px', fontWeight: 'bold' }
          });
          marker.addListener('click', () => new google.maps.InfoWindow({
            content: `<div style="font-size:13px;"><b>${row.name}</b><br><span style="color:#666;font-size:12px;">${row.addr}</span>${row.items?`<br><span style="font-size:12px;">個数: ${row.items}個</span>`:''}${row.vol?`<span style="font-size:12px;"> / ${row.vol}才</span>`:''}</div>`
          }).open(map, marker));
          markers.push(marker);
        });
        document.getElementById('status').textContent = `${locations.length}件を表示しました`;
        updateDateLabel();
        updateSidebar(locations, false);
        renderDriverSidebar();
        renderRightSidebar();
        saveLocationsToSession();
        if (locations.length > 0) {
          const bounds = new google.maps.LatLngBounds();
          bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
          locations.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
          map.fitBounds(bounds);
        }
      });
    } catch(err) { document.getElementById('status').textContent = 'エラー: ' + err.message; }
  };
  reader.readAsArrayBuffer(file);
}

function checkDone(processed, total, geocodeResults) {
  // 旧来の互換用。新しいコードはgeocodeAddresses()を使うためここは空処理
  if (processed === total) {
    console.log('checkDone called (legacy)');
  }
}

function saveLocationsToSession() {
  try {
    sessionStorage.setItem('haisha_locations', JSON.stringify(locations));
  sessionStorage.setItem('haisha_assignments', JSON.stringify(assignments));
    sessionStorage.setItem('haisha_currentDate', currentDate);
    sessionStorage.setItem('haisha_assignments', JSON.stringify(assignments));
    sessionStorage.setItem('haisha_depot', JSON.stringify(DEPOT));
  } catch(e) { console.warn('sessionStorage保存失敗:', e); }
}

function loadLocationsFromSession() {
  try {
    const locs = sessionStorage.getItem('haisha_locations');
    const date = sessionStorage.getItem('haisha_currentDate');
    const asgn = sessionStorage.getItem('haisha_assignments');
    const depot = sessionStorage.getItem('haisha_depot');
    if (!locs) return false;
    locations = JSON.parse(locs);
    if (date) currentDate = date;
    if (asgn) assignments = JSON.parse(asgn);
    if (depot) {
      const d = JSON.parse(depot);
      DEPOT.lat = d.lat; DEPOT.lng = d.lng; DEPOT.name = d.name; DEPOT.addr = d.addr;
      const nameEl = document.querySelector('.depot-name');
      const addrEl = document.querySelector('.depot-addr');
      if (nameEl) nameEl.textContent = d.name;
      if (addrEl) addrEl.textContent = d.addr;
    }
    return true;
  } catch(e) { return false; }
}

// ===== タブ =====
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab==='all');
  document.getElementById('tab-driver').classList.toggle('active', tab==='driver');
  document.getElementById('tab-all-content').style.display    = tab==='all'    ? '' : 'none';
  document.getElementById('tab-driver-content').style.display = tab==='driver' ? '' : 'none';
  if (tab === 'driver') renderDriverTab();
}

function renderDriverTab() {
  const bar = document.getElementById('driver-tab-bar');
  const list = document.getElementById('driver-stop-list');
  bar.innerHTML = ''; list.innerHTML = '';
  if (drivers.length === 0) { list.innerHTML = '<p style="font-size:12px;color:#aaa;">ドライバーを登録してください</p>'; return; }
  const tabs = [{ id: -1, name: '未割当' }, ...drivers];
  tabs.forEach((d, idx) => {
    const btn = document.createElement('button');
    btn.className = 'driver-tab' + (idx===selectedDriverTab?' active':'');
    btn.textContent = d.name;
    if (idx===selectedDriverTab) {
      const color = d.id===-1 ? '#95a5a6' : DRIVER_COLORS[drivers.findIndex(x=>x.id===d.id)%DRIVER_COLORS.length];
      btn.style.background = color; btn.style.borderColor = color; btn.style.color='white';
    }
    btn.onclick = () => {
      selectedDriverTab = idx;
      renderDriverTab();
      // ルート表示中ならドライバーフィルター適用
      if (routeLines.length > 0 && d.id !== -1) filterRouteByDriver(d.id);
    };
    bar.appendChild(btn);
  });
  const selTab = tabs[selectedDriverTab];
  let targetLocs = selTab.id===-1
    ? locations.map((loc,i)=>({loc,i})).filter(({i})=>!assignments[i])
    : locations.map((loc,i)=>({loc,i})).filter(({i})=>assignments[i]&&assignments[i].driverId===selTab.id);
  if (targetLocs.length===0) { list.innerHTML='<p style="font-size:12px;color:#aaa;">店舗なし</p>'; return; }
  const driverIdx = selTab.id===-1 ? -1 : drivers.findIndex(x=>x.id===selTab.id);
  const color = driverIdx>=0 ? DRIVER_COLORS[driverIdx%DRIVER_COLORS.length] : '#95a5a6';
  const totalItems = targetLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);
  const totalVol   = targetLocs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0);
  const summary = document.createElement('div');
  summary.style.cssText='font-size:11px;color:#666;margin-bottom:8px;padding:4px 8px;background:#f0f0f0;border-radius:4px;';
  summary.textContent=`${targetLocs.length}件 / 個数: ${totalItems}個 / 才数: ${totalVol.toFixed(1)}才`;
  list.appendChild(summary);
  targetLocs.forEach(({loc,i})=>{
    const bin = assignments[i]?assignments[i].bin:null;
    const div = document.createElement('div');
    div.className='stop-item'; div.style.borderLeft=`4px solid ${color}`;
    div.innerHTML=`<div class="stop-header"><span class="stop-name">${loc.name}</span>${bin?`<span style="margin-left:auto;font-size:10px;background:${color};color:white;padding:1px 5px;border-radius:3px;">第${bin}便</span>`:''}</div><div class="stop-addr">${loc.addr}</div>${loc.items||loc.vol?`<div class="stop-meta">${loc.items?loc.items+'個':''}${loc.vol?' / '+loc.vol+'才':''}</div>`:''}`;
    div.onclick=()=>{map.panTo({lat:loc.lat,lng:loc.lng});map.setZoom(16);};
    list.appendChild(div);
  });
}

// ===== サイドバー =====
// デポ選択UIを更新
let selectedDepotCodes = new Set(); // 選択中のデポコード（空=全表示）

function renderDepotFilterBtns() {
  const container = document.getElementById('depot-selector');
  if (!container) return;

  const depotCodes = [...new Set(locations.map(l => l.depotCode).filter(Boolean))];
  const depotList = window._depots || [];

  container.innerHTML = '';

  if (depotCodes.length === 0) {
    // デポコードなし：シンプル表示
    const item = document.createElement('div');
    item.className = 'depot-select-item active';
    const allItems = locations.reduce((s, l) => s + (Number(l.items) || 0), 0);
    const allVol   = locations.reduce((s, l) => s + (Number(l.vol)   || 0), 0);
    const allMeta  = locations.length > 0
      ? `<div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;">${locations.length}件 / ${allItems}個 / ${allVol.toFixed(1)}才</div>`
      : '';
    item.innerHTML = `<div class="depot-select-dot"></div><div style="flex:1;"><div class="depot-select-name" id="depot-display-name">神戸西デポ</div>${allMeta}</div>`;
    container.appendChild(item);
    return;
  }

  // デポコードがある場合：選択カードを表示
  depotCodes.forEach(code => {
    const depot = depotList.find(d => d.csvCode === code);
    const label = depot ? depot.name : code;
    const isActive = selectedDepotCodes.size === 0 || selectedDepotCodes.has(code);

    const item = document.createElement('div');
    item.className = 'depot-select-item' + (isActive ? ' active' : '');
    // デポに紐づく件数・個数・才数を集計
    const depotLocs = locations.filter(l => l.depotCode === code);
    const depotItems = depotLocs.reduce((s, l) => s + (Number(l.items) || 0), 0);
    const depotVol   = depotLocs.reduce((s, l) => s + (Number(l.vol)   || 0), 0);
    const depotMeta  = depotLocs.length > 0
      ? `<div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;">${depotLocs.length}件 / ${depotItems}個 / ${depotVol.toFixed(1)}才</div>`
      : '';
    item.innerHTML = `<div class="depot-select-dot"></div><div style="flex:1;"><div class="depot-select-name">${label}</div>${depotMeta}</div>`;
    item.onclick = () => toggleDepotFilter(code);
    container.appendChild(item);
  });
}

function toggleDepotFilter(code) {
  if (selectedDepotCodes.has(code)) {
    selectedDepotCodes.delete(code);
    // 全部外れたら全表示に戻す
    if (selectedDepotCodes.size === 0) {
      selectedDepotCodes = new Set();
    }
  } else {
    selectedDepotCodes.add(code);
  }
  applyDepotFilter();
}

function applyDepotFilter() {
  renderDepotFilterBtns();

  // 表示する配送先を決定
  const filtered = selectedDepotCodes.size === 0
    ? locations
    : locations.filter(l => selectedDepotCodes.has(l.depotCode));

  // デポマーカーを切り替え（単一選択時はそのデポ、複数/全表示は最初のデポ）
  if (selectedDepotCodes.size === 1) {
    setDepotByCode([...selectedDepotCodes][0]);
  } else {
    const firstCode = locations.find(l => l.depotCode)?.depotCode;
    if (firstCode) setDepotByCode(firstCode);
  }

  // マーカー再描画
  markers.forEach(m => m.setMap(null)); markers = [];
  clearRouteLines(); orderedLocations = [];

  filtered.forEach((loc, idx) => {
    const locIdx = locations.indexOf(loc);
    const asgn = assignments[locIdx];
    const driverIdx = asgn ? drivers.findIndex(d => d.id === asgn.driverId) : -1;
    const fillColor = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : '#e74c3c';
    const marker = new google.maps.Marker({
      position: { lat: loc.lat, lng: loc.lng }, map, title: loc.name,
      label: { text: String(idx+1), color: 'white', fontSize: '11px', fontWeight: 'bold' },
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor, fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
    });
    marker.addListener('click', () => new google.maps.InfoWindow({
      content: `<b>${loc.name}</b><br><small>${loc.addr}</small>`
    }).open(map, marker));
    markers.push(marker);
  });

  if (filtered.length > 0) {
    const bounds = new google.maps.LatLngBounds();
    bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
    filtered.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
    map.fitBounds(bounds);
  }

  updateSidebar(filtered, false);
  renderDriverSidebar();
  renderRightSidebarFiltered(filtered);

  const label = selectedDepotCodes.size === 0 ? `全${locations.length}件表示`
    : `${filtered.length}件表示`;
  document.getElementById('status').textContent = label;
}

// ===== ルート =====
// 複数ルートライン管理
let routeLines = []; // 全ルートライン
let activeDriverFilter = null; // null=全員表示

function drawRoute() {
  if (locations.length < 1) { alert('配送先を読み込んでください'); return; }
  clearRouteLines();
  markers.forEach(m => m.setMap(null)); markers = [];
  orderedLocations = [];
  activeDriverFilter = null;

  // ドライバーごとにルートを描画
  const assignedDriverIds = [...new Set(
    Object.values(assignments).map(a => a.driverId)
  )];

  if (assignedDriverIds.length === 0) {
    // 割り当てなし→全店舗を1本のルートで表示
    const routeIdx = nearestNeighbor(locations, DEPOT);
    orderedLocations = routeIdx.map(i => locations[i]);
    const line = new google.maps.Polyline({
      path: [{lat:DEPOT.lat,lng:DEPOT.lng},...orderedLocations.map(l=>({lat:l.lat,lng:l.lng})),{lat:DEPOT.lat,lng:DEPOT.lng}],
      geodesic:true, strokeColor:'#1D9E75', strokeOpacity:0.85, strokeWeight:3
    });
    line.setMap(map);
    routeLines.push({ line, driverId: null });
    orderedLocations.forEach((loc,i) => {
      const marker = new google.maps.Marker({
        position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
        label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'},
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:'#1D9E75',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
      });
      marker.addListener('click', () => highlightStopCard(locations.indexOf(loc)));
      markers.push(marker);
    });
    document.getElementById('status').textContent = `全${orderedLocations.length}件のルートを表示しました（割り当てなし）`;
  } else {
    // ドライバーごとにルート描画
    let totalStops = 0;
    assignedDriverIds.forEach(driverId => {
      const driverIdx = drivers.findIndex(d => d.id === driverId);
      const color = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : '#aaa';
      const driverName = driverIdx >= 0 ? drivers[driverIdx].name : '不明';

      // このドライバーの店舗（便順でソート）
      const driverLocs = [];
      [1, 2].forEach(bin => {
        const binLocs = locations.map((loc,i) => ({loc,i}))
          .filter(({i}) => assignments[i] && assignments[i].driverId === driverId && assignments[i].bin === bin);
        if (binLocs.length === 0) return;

        // 最近傍法でルート最適化
        const locs = binLocs.map(({loc}) => loc);
        const routeIdx = nearestNeighbor(locs, DEPOT);
        const ordered = routeIdx.map(i => locs[i]);

        const path = [{lat:DEPOT.lat,lng:DEPOT.lng}, ...ordered.map(l=>({lat:l.lat,lng:l.lng})), {lat:DEPOT.lat,lng:DEPOT.lng}];
        const line = new google.maps.Polyline({
          path, geodesic:true,
          strokeColor: color,
          strokeOpacity: 0.85,
          strokeWeight: bin === 1 ? 4 : 3,
          strokePattern: bin === 2 ? [{icon:{path:'M 0,-1 0,1',strokeOpacity:1,scale:3},offset:'0',repeat:'12px'}] : null
        });
        line.setMap(map);
        routeLines.push({ line, driverId, bin });

        // マーカー描画：ドライバー内の順番（oi+1）でピン番号をつける
        for (let oi = 0; oi < ordered.length; oi++) {
          totalStops++;
          (function(sn, loc) {
            const marker = new google.maps.Marker({
              position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
              label:{text:String(sn),color:'white',fontSize:'10px',fontWeight:'bold'},
              icon:{path:google.maps.SymbolPath.CIRCLE,scale:13,fillColor:color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
            });
            marker.addListener('click', () => {
              highlightStopCard(locations.indexOf(loc));
              new google.maps.InfoWindow({
                content:`<b>${sn}番目: ${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${driverName} / 第${bin}便</small>`
              }).open(map, marker);
            });
            markers.push(marker);
            driverLocs.push(loc);
          })(oi + 1, ordered[oi]);  // totalStopsではなくドライバー内順番(oi+1)を使う
        }
      });
      orderedLocations.push(...driverLocs);
    });
    document.getElementById('status').textContent = `${assignedDriverIds.length}名・${totalStops}件のルートを表示しました`;
  }

  // 地図範囲を調整
  const bounds = new google.maps.LatLngBounds();
  bounds.extend({lat:DEPOT.lat,lng:DEPOT.lng});
  (orderedLocations.length > 0 ? orderedLocations : locations).forEach(l => bounds.extend({lat:l.lat,lng:l.lng}));
  map.fitBounds(bounds);

  updateSidebar(orderedLocations.length > 0 ? orderedLocations : locations, true);
  renderDriverSidebar();
}

function clearRouteLines() {
  routeLines.forEach(({line}) => line.setMap(null));
  routeLines = [];
  if (routeLine) { routeLine.setMap(null); routeLine = null; }
}

// 特定ドライバーのルートだけ表示
function filterRouteByDriver(driverId) {
  if (activeDriverFilter === driverId && driverId !== 'unassigned') {
    activeDriverFilter = null;
    routeLines.forEach(({line}) => line.setMap(map));
    markers.forEach(m => m.setMap(map));
    document.getElementById('status').textContent = '全ドライバーのルートを表示しました';
    renderDriverSidebar();
    renderRightSidebar();
  } else {
    activeDriverFilter = driverId;
    orderedLocations = []; // ドライバー選択時は全件orderedをクリア
    routeLines.forEach(({line, driverId: rid}) => {
      line.setMap(rid === driverId || rid === null ? map : null);
    });
    markers.forEach(m => m.setMap(null));
    markers = [];
    const driverIdx = drivers.findIndex(d => d.id === driverId);
    const color = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : '#aaa';
    const dName = driverIdx >= 0 ? drivers[driverIdx].name : '不明';
    let stopNum = 0;
    [1, 2].forEach(bin => {
      const binLocs = locations.map((loc, i) => ({loc, i}))
        .filter(({i}) => assignments[i] && assignments[i].driverId === driverId && assignments[i].bin === bin);
      if (binLocs.length === 0) return;
      const locs = binLocs.map(({loc}) => loc);
      const routeIdx = nearestNeighbor(locs, DEPOT);
      for (let ri = 0; ri < routeIdx.length; ri++) {
        stopNum++;
        (function(sn, loc) {
          const marker = new google.maps.Marker({
            position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
            label:{text:String(sn),color:'white',fontSize:'11px',fontWeight:'bold'},
            icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
          });
          marker.addListener('click', () => {
            highlightStopCard(locations.indexOf(loc));
            new google.maps.InfoWindow({
              content:`<b>${sn}番目: ${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${dName} / 第${bin}便</small>`
            }).open(map, marker);
          });
          markers.push(marker);
        })(stopNum, locs[routeIdx[ri]]);
      }
    });
    document.getElementById('status').textContent = `${dName}のルートを表示中 ${stopNum}件（もう一度押すと全員表示）`;
    renderDriverSidebar();
    renderRightSidebar();
  }
}
function clearRoute() {
  clearRouteLines();
  markers.forEach(m=>m.setMap(null)); markers=[];
  activeDriverFilter = null;
  locations.forEach((loc,i)=>{
    const asgn=assignments[i]; const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    const fillColor=driverIdx>=0?DRIVER_COLORS[driverIdx%DRIVER_COLORS.length]:'#e74c3c';

function autoAssign() {
  if (drivers.length === 0) { alert('ドライバーを先に登録してください'); return; }

  // 本日稼働中のドライバーのみ対象
  const activeDrivers = drivers.filter(d => d.availableToday !== false);
  if (activeDrivers.length === 0) { alert('本日稼働中のドライバーがいません'); return; }

  // 車両情報をlocalStorageから取得（vehicles.htmlで登録したデータ）
  let vehicles = [];
  try { vehicles = JSON.parse(localStorage.getItem('haisha_vehicles') || '[]'); } catch(e) {}

  // ドライバーごとの積載上限を取得（車両未設定の場合はデフォルト値）
  const DEFAULT_MAX_VOL   = 9999;
  const DEFAULT_MAX_ITEMS = 9999;
  function getDriverLimits(driver) {
    if (driver.vehicleId) {
      const v = vehicles.find(v => String(v.id) === String(driver.vehicleId));
      if (v) return { maxVol: Number(v.maxVol) || DEFAULT_MAX_VOL, maxItems: Number(v.maxItems) || DEFAULT_MAX_ITEMS };
    }
    return { maxVol: DEFAULT_MAX_VOL, maxItems: DEFAULT_MAX_ITEMS };
  }

  // 2点間の距離計算（km）
  function calcDist(a, b) {
    const R = 111;
    const dlat = (b.lat - a.lat) * R;
    const dlng = (b.lng - a.lng) * R * Math.cos((a.lat + b.lat) / 2 * Math.PI / 180);
    return Math.sqrt(dlat * dlat + dlng * dlng);
  }

  assignments = {};

  // 才数の多い順に並び替え（才数がない場合は個数で代替）
  const sorted = locations
    .map((loc, i) => ({ loc, i, vol: Number(loc.vol) || 0, items: Number(loc.items) || 0 }))
    .sort((a, b) => b.vol !== a.vol ? b.vol - a.vol : b.items - a.items);

  // コース番号ゼロ埋め2桁統一ヘルパー
  const normCourse = c => String(c || '').trim().replace(/^'+/, '').padStart(2, '0');

  // 各ドライバーの積載状況（1便・2便それぞれ独立カウンター）
  const driverState = activeDrivers.map(d => {
    const limits = getDriverLimits(d);
    return {
      driver: d,
      usedVol1: 0, usedItems1: 0,
      usedVol2: 0, usedItems2: 0,
      maxVol: limits.maxVol, maxItems: limits.maxItems,
      assigned: []
    };
  });

  // 割り当てループ
  sorted.forEach(({ loc, i, vol, items }) => {
    const locCourse = normCourse(loc.course);
    const locDepot  = (loc.depotCode || '').trim().replace(/^'+/, '');

    const depotOk = s => {
      const dDepot = s.driver.depot || '';
      if (!locDepot || !dDepot || dDepot === 'both') return true;
      const dCode = dDepot === 'kobe' ? '2806' : dDepot === 'tamba' ? '2805' : dDepot;
      return dCode === locDepot;
    };

    // コース一致 × 積載チェック（1便・2便独立）
    const bin1Match = driverState.filter(s =>
      depotOk(s) &&
      s.driver.courses && s.driver.courses.length > 0 &&
      s.driver.courses.map(normCourse).includes(locCourse) &&
      s.usedVol1 + vol <= s.maxVol &&
      s.usedItems1 + items <= s.maxItems
    );
    const bin2Match = driverState.filter(s =>
      depotOk(s) &&
      s.driver.coursesBin2 && s.driver.coursesBin2.length > 0 &&
      s.driver.coursesBin2.map(normCourse).includes(locCourse) &&
      s.usedVol2 + vol <= s.maxVol &&
      s.usedItems2 + items <= s.maxItems
    );

    // コース一致なし → 未割当（フォールバックなし）
    let candidates, binNum;
    if (bin1Match.length > 0) {
      candidates = bin1Match; binNum = 1;
    } else if (bin2Match.length > 0) {
      candidates = bin2Match; binNum = 2;
    } else {
      return; // コース不一致・未設定 → 未割当
    }

    // スコア計算：地理的距離
    let best = null, bestScore = Infinity;
    candidates.forEach(s => {
      let score;
      if (s.assigned.length === 0) {
        score = calcDist(DEPOT, loc);
      } else {
        const avgLat = s.assigned.reduce((sum, l) => sum + l.lat, 0) / s.assigned.length;
        const avgLng = s.assigned.reduce((sum, l) => sum + l.lng, 0) / s.assigned.length;
        score = calcDist({ lat: avgLat, lng: avgLng }, loc);
      }
      if (score < bestScore) { bestScore = score; best = s; }
    });

    if (best) {
      assignments[i] = { driverId: best.driver.id, bin: binNum };
      if (binNum === 1) { best.usedVol1 += vol; best.usedItems1 += items; }
      else              { best.usedVol2 += vol; best.usedItems2 += items; }
      best.assigned.push(loc);
    }
  });

  const assignedCount   = Object.keys(assignments).length;
  const unassignedCount = locations.length - assignedCount;
  sessionStorage.setItem('haisha_assignments', JSON.stringify(assignments));
  renderAssignPanel();
  document.getElementById('status').textContent =
    `自動配車完了：${assignedCount}件割当 / 未割当${unassignedCount}件（手動で調整できます）`;
}

function applyAssign() {
  closeAllPanels();
  markers.forEach(m=>m.setMap(null)); markers=[];
  const locs=orderedLocations.length>0?orderedLocations:locations;
  locs.forEach((loc,i)=>{
    const locIdx=locations.indexOf(loc); const asgn=assignments[locIdx];
    const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    const fillColor=driverIdx>=0?DRIVER_COLORS[driverIdx%DRIVER_COLORS.length]:'#e74c3c';
    const marker=new google.maps.Marker({ position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name, label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'}, icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2} });
    const dName=driverIdx>=0?drivers[driverIdx].name:'未割当';
    const binStr=asgn&&asgn.bin?` / 第${asgn.bin}便`:'';
    marker.addListener('click',()=>new google.maps.InfoWindow({content:`<b>${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${dName}${binStr}</small>`}).open(map,marker));
    markers.push(marker);
  });
  updateSidebar(locs,orderedLocations.length>0);
  if (currentTab==='driver') renderDriverTab();
  document.getElementById('status').textContent='配車割り当てを地図に反映しました';
  renderDriverSidebar();
  renderRightSidebar();
  saveLocationsToSession();
}

// ===== Supabase共有 =====
async function openSharePanel() {
  if (locations.length===0) { alert('先にExcelを読み込んでください'); return; }
  if (drivers.length===0)   { alert('先にドライバーを登録してください'); return; }
  const content=document.getElementById('share-content');
  content.innerHTML='<p style="font-size:13px;color:#888;">Supabaseに保存中...</p>';
  document.getElementById('share-panel').style.display='block';
  document.getElementById('overlay').style.display='block';

  try {
    // 既存データ削除（同日・同部署）
    if (currentDeliveryId) {
      await sbClient.from('deliveries').delete().eq('id', currentDeliveryId);
    }

    // deliveriesテーブルに保存
    const { data: delData, error: delErr } = await sbClient
      .from('deliveries')
      .insert({ busho: currentBusho, delivery_date: currentDate })
      .select().single();
    if (delErr) throw delErr;
    currentDeliveryId = delData.id;

    // delivery_stopsに全店舗を保存
    const stops = locations.map((loc, i) => {
      const asgn = assignments[i];
      const driverIdx = asgn ? drivers.findIndex(d=>d.id===asgn.driverId) : -1;
      return {
        delivery_id: currentDeliveryId,
        stop_order: i + 1,
        name: loc.name,
        address: loc.addr,
        lat: loc.lat,
        lng: loc.lng,
        items: loc.items ? Number(loc.items) : null,
        vol: loc.vol ? Number(loc.vol) : null,
        driver_id: asgn ? String(asgn.driverId) : null,
        driver_name: driverIdx >= 0 ? drivers[driverIdx].name : null,
        bin: asgn ? asgn.bin : null,
        status: 'pending'
      };
    });

    const { error: stopsErr } = await sbClient.from('delivery_stops').insert(stops);
    if (stopsErr) throw stopsErr;

    // ドライバーごとのURLを生成
    const baseUrl = window.location.href.replace('index.html','') + 'driver.html';
    let html = `<p style="font-size:12px;color:#27ae60;font-weight:bold;margin-bottom:10px;">✅ 保存完了！ドライバーに以下のURLを共有してください</p>`;

    drivers.forEach(driver => {
      const myLocs = locations.filter((_,i) => assignments[i] && assignments[i].driverId === driver.id);
      if (myLocs.length === 0) return;
      const url = `${baseUrl}?delivery=${currentDeliveryId}&driver=${encodeURIComponent(driver.name)}`;
      html += `<div class="share-driver-item">
        <div>
          <div style="font-weight:bold;font-size:13px;">${driver.name}</div>
          <div style="font-size:11px;color:#888;">${myLocs.length}件</div>
        </div>
        <button class="copy-btn" onclick="copyUrl('${url}','${driver.name}')">URLをコピー</button>
      </div>`;
    });

    html += `<div style="margin-top:12px;padding:10px;background:#fff8e1;border-radius:6px;font-size:12px;color:#856404;">
      💡 ドライバーはAndroidスマホでURLを開くだけで自分の配送先が確認できます
    </div>`;
    content.innerHTML = html;

  } catch(err) {
    content.innerHTML = `<p style="color:#e74c3c;font-size:13px;">エラー: ${err.message}</p>`;
  }
}

function copyUrl(url, name) {
  navigator.clipboard.writeText(url).then(()=>{ alert(`${name}のURLをコピーしました`); }).catch(()=>{ prompt('URLをコピーしてください:', url); });
}

// ===== ユーティリティ =====

// ===== 右サイドバー =====
let rightTab = 'all';
let draggedLocIdx = null;


// ===== カード・マーカーのハイライト =====
function highlightStopCard(locIdx) {
  // 全カードのハイライトを解除
  document.querySelectorAll('.stop-card').forEach(c => c.style.outline = '');
  // 対象カードをハイライト
  document.querySelectorAll('.stop-card').forEach(c => {
    if (parseInt(c.dataset.locIdx) === locIdx) {
      c.style.outline = '2px solid #3b82f6';
      c.scrollIntoView({block:'nearest', behavior:'smooth'});
    }
  });
}

function highlightMarker(targetLoc) {
  // マーカーを一時的に大きくする
  markers.forEach(m => {
    if (m.getTitle() === targetLoc.name) {
      const origIcon = m.getIcon();
      m.setIcon({...origIcon, scale:18});
      setTimeout(() => m.setIcon(origIcon), 1500);
    }
  });
}

function unassignStop(locIdx) {
  delete assignments[locIdx];
  saveLocationsToSession();
  renderDriverSidebar();
  renderRightSidebar();
  if (routeLines.length > 0) drawRoute();
  document.getElementById('status').textContent = '割当を解除しました';
}

function setRightTab(tab) {
  rightTab = tab;
  document.getElementById('rs-tab-all').classList.toggle('active', tab==='all');
  document.getElementById('rs-tab-unassigned').classList.toggle('active', tab==='unassigned');
  renderRightSidebar();
}

function renderRightSidebar() {
  const el = document.getElementById('right-stop-list');
  const title = document.getElementById('right-sidebar-title');
  if (!el) return;

  let locs;
  if (activeDriverFilter === 'unassigned' || (typeof activeDriverFilter === 'string' && activeDriverFilter.startsWith('unassigned_'))) {
    const depotCode = (typeof activeDriverFilter === 'string' && activeDriverFilter.startsWith('unassigned_')) ? activeDriverFilter.replace('unassigned_','') : null;
    const depotLabel = depotCode === '2806' ? '神戸西' : depotCode === '2805' ? '丹波' : '';
    title.textContent = depotLabel ? `${depotLabel} 未割当` : '未割当の配送先';
    locs = locations.map((loc, i) => ({loc, i}))
      .filter(({loc, i}) => !assignments[i] && (!depotCode || (loc.depotCode || '') === depotCode));
  } else if (activeDriverFilter !== null) {
    const driver = drivers.find(d => d.id === activeDriverFilter);
    title.textContent = `${driver ? driver.name : '不明'} の配送先`;
    // 常にassignmentsから直接取る（orderedLocationsは全員分混在のため使わない）
    locs = locations.map((loc, i) => ({loc, i}))
      .filter(({i}) => assignments[i] && assignments[i].driverId === activeDriverFilter)
      .sort((a, b) => {
        const ba = assignments[a.i]?.bin || 1, bb = assignments[b.i]?.bin || 1;
        return ba !== bb ? ba - bb : (a.loc.stop_order||0) - (b.loc.stop_order||0);
      });
  } else {
    title.textContent = '配送先リスト';
    locs = locations.map((loc, i) => ({loc, i}));
  }

  el.innerHTML = '';
  if (locs.length === 0) {
    el.innerHTML = '<p style="font-size:11px;color:rgba(255,255,255,0.3);">表示する配送先がありません</p>';
    return;
  }

  // 合計サマリー
  const totalItems = locs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);
  const totalVol   = locs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0);
  const summary = document.createElement('div');
  summary.style.cssText = 'font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px;padding:3px 6px;background:rgba(255,255,255,0.04);border-radius:4px;';
  summary.textContent = `${locs.length}件 / ${totalItems}個 / ${totalVol.toFixed(1)}才`;
  el.appendChild(summary);

  // カード生成ヘルパー
  function makeCard(loc, i, loopIdx, color, useSmall) {
    const card = document.createElement('div');
    card.className = 'stop-card';
    card.draggable = true;
    card.dataset.locIdx = i;
    card.style.borderLeft = `3px solid ${color}`;
    card.style.marginBottom = '2px';
    if (useSmall) card.style.fontSize = '10px';
    const numW = loopIdx >= 99 ? '22px' : loopIdx >= 9 ? '18px' : '16px';
    const numStr = activeDriverFilter !== 'unassigned' ? String(loopIdx + 1) : '';
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:2px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:3px;margin-bottom:1px;">
            ${numStr ? `<span style="background:${color};color:white;border-radius:50%;width:${numW};height:${numW};display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;flex-shrink:0;">${numStr}</span>` : ''}
            <span style="font-weight:600;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${loc.name}</span>
          </div>
          <div style="font-size:9px;color:rgba(255,255,255,0.4);display:flex;gap:4px;padding-left:${numStr ? numW : '0'};">
            ${loc.items ? `<span>${loc.items}個</span>` : ''}
            ${loc.vol   ? `<span>${Number(loc.vol).toFixed(0)}才</span>` : ''}
          </div>
        </div>
        ${assignments[i] ? `<button onclick="unassignStop(${i})" style="flex-shrink:0;background:rgba(239,68,68,0.15);color:#f87171;border:none;border-radius:3px;padding:1px 4px;font-size:9px;cursor:pointer;">解除</button>` : ''}
      </div>`;
    card.addEventListener('dragstart', e => { draggedLocIdx = i; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); draggedLocIdx = null; });
    card.addEventListener('click', e => { if (e.target.tagName === 'BUTTON') return; highlightStopCard(i); highlightMarker(loc); });
    return card;
  }

  // ===== ドライバー選択中：便ごとにヘッダー＋縦→2列表示 =====
  if (activeDriverFilter !== null && activeDriverFilter !== 'unassigned') {
    const driverIdx = drivers.findIndex(d => d.id === activeDriverFilter);
    const color = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : 'rgba(255,255,255,0.2)';

    // 便ごとにグループ化
    const bins = {};
    locs.forEach(({loc, i}, idx) => {
      const bin = assignments[i]?.bin || 1;
      if (!bins[bin]) bins[bin] = [];
      bins[bin].push({loc, i, idx});
    });

    // 1便+2便の合計が13件超えたら全体を2列モードにする
    const COL_LIMIT = 13;
    const totalLocs = locs.length;
    const use2col = totalLocs > COL_LIMIT;
    let globalIdx = 0; // 全便通しの連番（左右振り分け用）
    const allCards = []; // 全カードを一旦収集

    Object.keys(bins).map(Number).sort((a,b)=>a-b).forEach(binNum => {
      const binLocs = bins[binNum];
      const binItems = binLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);
      const binVol   = binLocs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0);

      // 便ヘッダー
      const header = document.createElement('div');
      header.style.cssText = `font-size:10px;font-weight:700;color:${color};margin:6px 0 3px;padding:2px 6px;background:${color}22;border-radius:3px;border-left:2px solid ${color};`;
      header.textContent = `第${binNum}便  ${binLocs.length}件 / ${binItems}個 / ${binVol.toFixed(0)}才`;
      header.dataset.binHeader = '1';

      allCards.push({ el: header, isHeader: true });
      binLocs.forEach(({loc, i, idx}) => {
        allCards.push({ el: makeCard(loc, i, idx, color, use2col), isHeader: false });
      });
    });

    if (!use2col) {
      allCards.forEach(({el: cardEl}) => el.appendChild(cardEl));
    } else {
      // 左列：1〜13件目（ヘッダー含む）、右列：14件目以降
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;gap:4px;align-items:flex-start;';
      const col1 = document.createElement('div'); col1.style.cssText = 'flex:1;min-width:0;';
      const col2 = document.createElement('div'); col2.style.cssText = 'flex:1;min-width:0;';
      let cardCount = 0; // ヘッダー除いた件数カウント
      allCards.forEach(({el: cardEl, isHeader}) => {
        if (cardCount < COL_LIMIT) {
          col1.appendChild(cardEl);
        } else {
          col2.appendChild(cardEl);
        }
        if (!isHeader) cardCount++;
      });
      wrap.appendChild(col1); wrap.appendChild(col2);
      el.appendChild(wrap);
    }
    return;
  }

  // ===== 全件表示・未割当：従来の1列 =====
  locs.forEach(({loc, i}, loopIdx) => {
    const asgn = assignments[i];
    const driverIdx = asgn ? drivers.findIndex(d => d.id === asgn.driverId) : -1;
    const color = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : 'rgba(255,255,255,0.2)';
    const dName = driverIdx >= 0 ? drivers[driverIdx].name : '未割当';
    const bin   = asgn ? `第${asgn.bin}便` : '';
    const card  = makeCard(loc, i, loopIdx, color, false);
    // 全件表示時はドライバー名・便を下段に追加
    const meta = card.querySelector('div[style*="gap:4px"]') || card.querySelector('div[style*="gap: 4px"]');
    if (meta) {
      const sp = document.createElement('span');
      sp.style.cssText = asgn ? `color:${color};` : 'color:#f59e0b;';
      sp.textContent = asgn ? `${dName} ${bin}` : '未割当';
      meta.appendChild(sp);
    }
    el.appendChild(card);
  });
}

function renderDriverSidebar() {

        const marker = new google.maps.Marker({
          position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
          label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'},
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
        });
        markers.push(marker);
      });
      document.getElementById('status').textContent = `全${locations.length}件を表示しました`;

    renderRightSidebar();

      const bounds = new google.maps.LatLngBounds();

  el.appendChild(allBtn);

  // 未割当ボタン（デポ別）

    { code: '2805', label: '丹波 未割当',   color: '#a78bfa', filter: 'unassigned_2805' },
  ];
  DEPOT_LIST.forEach(({ code, label, color: depotColor, filter }) => {
    const unLocs = locations.filter((_, i) => !assignments[i] && (locations[i]?.depotCode || '') === code);
    if (unLocs.length === 0) return;
    const unItems = unLocs.reduce((s, l) => s + (Number(l.items) || 0), 0);
    const unVol   = unLocs.reduce((s, l) => s + (Number(l.vol)   || 0), 0);
    const unBtn = document.createElement('div');
    unBtn.className = 'driver-sb-card' + (activeDriverFilter === filter ? ' active' : '');
    unBtn.style.borderLeft = `3px solid ${depotColor}`;
    unBtn.innerHTML = `<span class="driver-sb-dot" style="background:${depotColor};"></span><span class="driver-sb-name">${label}</span><span class="driver-sb-meta">${unLocs.length}件/${unItems}個/${unVol.toFixed(0)}才</span>`;
    unBtn.onclick = () => {
      activeDriverFilter = filter;
      routeLines.forEach(({line}) => line.setMap(null));
      markers.forEach(m => m.setMap(null));
      markers = [];
      unLocs.forEach((loc, idx) => {
        const marker = new google.maps.Marker({
          position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
          label:{text:String(idx+1),color:'white',fontSize:'11px',fontWeight:'bold'},
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:depotColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
        });
        marker.addListener('click', () => {
          highlightStopCard(locations.indexOf(loc));
          new google.maps.InfoWindow({content:`<b>${loc.name}</b><br><small>${loc.addr}</small>`}).open(map, marker);
        });
        markers.push(marker);
      });
      document.getElementById('status').textContent = `${label}: ${unLocs.length}件`;
      renderDriverSidebar();
      renderRightSidebar();
    };
    el.appendChild(unBtn);
  });

  // 各ドライバー（社員コード順）
  const sortedDrivers = [...activeDrivers].sort((a,b) => {
    const ca = (a.code||'zzz').toLowerCase();
    const cb = (b.code||'zzz').toLowerCase();
    return ca.localeCompare(cb);
  });
  sortedDrivers.forEach(driver => {
    const driverIdx = drivers.indexOf(driver);
    const color = DRIVER_COLORS[driverIdx % DRIVER_COLORS.length];
    const myLocs = locations.filter((_, i) => assignments[i] && assignments[i].driverId === driver.id);
    const myItems = myLocs.reduce((s, l) => s + (Number(l.items) || 0), 0);
    const card = document.createElement('div');
    card.className = 'driver-sb-card' + (activeDriverFilter === driver.id ? ' active' : '');
    card.style.borderLeft = `3px solid ${color}`;
    if (driver.yoizumiToday) card.style.background = 'rgba(139,92,246,0.15)';
    const myVol = myLocs.reduce((s, l) => s + (Number(l.vol) || 0), 0);
    card.innerHTML = `<span class="driver-sb-dot" style="background:${color};"></span><span class="driver-sb-name">${driver.name}${driver.yoizumiToday?' 🌙':''}</span><span class="driver-sb-meta">${myLocs.length}件/${myItems}個/${myVol.toFixed(0)}才</span>`;
    // ドロップゾーン設定
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drop-target'); });
    card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drop-target');
      if (draggedLocIdx === null) return;
      const prevAsgn = assignments[draggedLocIdx];
      assignments[draggedLocIdx] = { driverId: driver.id, bin: prevAsgn ? prevAsgn.bin : 1 };
      saveLocationsToSession();
      renderRightSidebar();
      renderDriverSidebar();
      // ルート表示中なら再描画
      if (routeLines.length > 0) drawRoute();
      document.getElementById('status').textContent = `${driver.name}に移動しました`;
    });
    card.onclick = () => {
      filterRouteByDriver(driver.id);
      renderDriverSidebar();
      renderRightSidebar();
    };
    el.appendChild(card);
  });
}
function dist(a,b) { const R=111,dlat=(b.lat-a.lat)*R,dlng=(b.lng-a.lng)*R*Math.cos((a.lat+b.lat)/2*Math.PI/180); return Math.sqrt(dlat*dlat+dlng*dlng); }
function nearestNeighbor(locs,start) {
  const n=locs.length,visited=new Array(n).fill(false),route=[];
  let cur=start;
  for(let i=0;i<n;i++){let best=-1,bd=Infinity;for(let j=0;j<n;j++){if(!visited[j]){const d=dist(cur,locs[j]);if(d<bd){bd=d;best=j;}}}visited[best]=true;route.push(best);cur=locs[best];}
  return route;
}

// history.htmlから呼び出されたスナップショットを復元
function restoreSnapshotFromHistory() {
  const raw = sessionStorage.getItem('haisha_restore_snapshot');
  if (!raw) return;
  sessionStorage.removeItem('haisha_restore_snapshot');
  try {
    const s = JSON.parse(raw);
    currentDate      = s.currentDate || '';
    currentBusho     = s.currentBusho || 1;
    DEPOT            = Object.assign({}, s.DEPOT);
    locations        = (s.locations || []).map(function(l) { return Object.assign({}, l); });
    orderedLocations = (s.orderedLocations || []).map(function(l) { return Object.assign({}, l); });
    assignments      = JSON.parse(JSON.stringify(s.assignments || {}));

    markers.forEach(function(m) { m.setMap(null); }); markers = [];
    if (routeLine) { routeLine.setMap(null); routeLine = null; }
    clearRouteLines();

    if (depotMarker) depotMarker.setMap(null);
    depotMarker = new google.maps.Marker({
      position: { lat: DEPOT.lat, lng: DEPOT.lng }, map: map,
      title: DEPOT.name,
      icon: { path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW, scale: 6, fillColor:'#8b5cf6', fillOpacity:1, strokeColor:'#fff', strokeWeight:2 }
    });

    var bounds = new google.maps.LatLngBounds();
    bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
    locations.forEach(function(loc, i) {
      var marker = new google.maps.Marker({
        position: { lat: loc.lat, lng: loc.lng }, map: map,
        label: { text: String(i+1), color:'white', fontSize:'11px', fontWeight:'bold' },
        title: loc.name
      });
      markers.push(marker);
      bounds.extend({ lat: loc.lat, lng: loc.lng });
    });
    map.fitBounds(bounds);

    updateDateLabel();
    renderRightSidebar();
    renderDriverSidebar();
    document.getElementById('status').textContent = '「' + s.name + '」を呼び出しました（' + locations.length + '件）';
  } catch(e) {
    console.error('スナップショット復元エラー:', e);
  }
}

// メニューから渡されたファイルを自動読み込み
function loadPendingFile() {
  const fileName = sessionStorage.getItem('pendingFileName');
  const fileDataStr = sessionStorage.getItem('pendingFileData');
  if (!fileName || !fileDataStr) return;
  // メニューから渡された追加モードフラグを取得
  const appendMode = sessionStorage.getItem('pendingAppendMode') === '1';
  sessionStorage.removeItem('pendingFileName');
  sessionStorage.removeItem('pendingFileData');
  sessionStorage.removeItem('pendingAppendMode');
  window._appendMode = appendMode;
  try {
    const arr = JSON.parse(fileDataStr);
    const uint8 = new Uint8Array(arr);
    const ext = fileName.split('.').pop().toLowerCase();
    document.getElementById('status').textContent = `${fileName} を読み込み中...`;
    if (ext === 'csv') {
      const blob = new Blob([uint8]);
      const file = new File([blob], fileName);
      loadCSV(file);
    } else {
      const workbook = XLSX.read(uint8, { type: 'array', cellDates: true });
      const fakeEvent = {
        target: { files: [new File([new Blob([uint8])], fileName)] }
      };
      // XLSXデータを直接処理
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { raw: false });
      const rowsRaw = XLSX.utils.sheet_to_json(sheet, { raw: true });
      processExcelData(rows, rowsRaw);
    }
  } catch(e) {
    document.getElementById('status').textContent = 'ファイル読み込みエラー: ' + e.message;
  }
}

// Excel処理を関数に分離
function processExcelData(rows, rowsRaw) {
  if (rows.length === 0) { document.getElementById('status').textContent = 'データが見つかりません'; return; }
  const keys = Object.keys(rows[0]);
  const addrKey = keys.find(k => k.includes('顧客住所1') || k.includes('住所'));
  const nameKey = keys.find(k => k.includes('顧客名称') || k.includes('名称'));
  const itemKey = keys.find(k => k === '個数' || k.includes('数量'));
  const volKey  = keys.find(k => k === '才数' || k.includes('才'));
  const dateKey = keys.find(k => k.includes('日付'));
  if (!addrKey) { document.getElementById('status').textContent = '住所列が見つかりません'; return; }
  currentDate = (dateKey && rowsRaw[0][dateKey]) ? (parseExcelDate(rowsRaw[0][dateKey]) || todayStr()) : todayStr();
  markers.forEach(m=>m.setMap(null)); markers=[];
  if (routeLine) { routeLine.setMap(null); routeLine=null; }
  locations=[]; orderedLocations=[]; assignments={}; currentDeliveryId=null;
  document.getElementById('status').textContent = `${rows.length}件を地図に配置中...`;
  const rowData = rows.map((row,i)=>({
    name: String(nameKey?row[nameKey]:`配送先${i+1}`),
    addr: row[addrKey]?String(row[addrKey]):null,
    items: itemKey?rowsRaw[i][itemKey]:null,
    vol: volKey?rowsRaw[i][volKey]:null
  }));
  const addresses = rowData.map(r=>r.addr);
  document.getElementById('status').textContent = `地図に配置中... (0/${addresses.filter(Boolean).length})`;
  geocodeAddresses(addresses,(done,total)=>{
    document.getElementById('status').textContent = `地図に配置中... (${done}/${total})`;
  }).then(coords=>{
    markers.forEach(m=>m.setMap(null)); markers=[];
    rowData.forEach((row,i)=>{
      const c=coords[i];
      if(!c||!row.addr)return;
      const loc={name:row.name,addr:row.addr,lat:c.lat,lng:c.lng,items:row.items,vol:row.vol};
      locations.push(loc);
      const markerIdx=locations.length-1;
      const marker=new google.maps.Marker({
        position:{lat:c.lat,lng:c.lng},map,title:row.name,
        label:{text:String(markerIdx+1),color:'white',fontSize:'11px',fontWeight:'bold'}
      });
      marker.addListener('click',()=>new google.maps.InfoWindow({
        content:`<div style="font-size:13px;"><b>${row.name}</b><br><span style="color:#666;font-size:12px;">${row.addr}</span>${row.items?`<br><span style="font-size:12px;">個数: ${row.items}個</span>`:''}${row.vol?`<span style="font-size:12px;"> / ${row.vol}才</span>`:''}</div>`
      }).open(map,marker));
      markers.push(marker);
    });
    document.getElementById('status').textContent=`${locations.length}件を表示しました`;
    updateSidebar(locations,false);
    renderDepotFilterBtns();
    renderDriverSidebar();
    renderRightSidebar();
    saveLocationsToSession();
    if(locations.length>0){
      const bounds=new google.maps.LatLngBounds();
      bounds.extend({lat:DEPOT.lat,lng:DEPOT.lng});
      locations.forEach(l=>bounds.extend({lat:l.lat,lng:l.lng}));
      map.fitBounds(bounds);
    }
  });
}
